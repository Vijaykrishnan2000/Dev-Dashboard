<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PR Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">PR Intelligence</div>
    <div class="user-profile">
      <div class="user-avatar">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#3b82f6"/>
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="white"/>
        </svg>
      </div>
      <div class="user-info">
        <div class="user-name">Vijay Krishnan</div>
        <div class="user-details">
          <div class="user-email">soundarakrishna@gmail.com</div>
          <div class="user-status">Active</div>
        </div>
      </div>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="storyList"></aside>

    <section class="content">
      <div id="statusBar"></div>

      <div id="emptyState">Select a story</div>

      <div id="details" class="hidden">
        <h2 id="storyTitle"></h2>
        <div id="storyStatus"></div>

        <div class="tabs">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="prs">PRs</button>
          <button class="tab" data-tab="analysis">Analysis</button>
        </div>

        <div id="overview" class="tab-content active"></div>
        <div id="prs" class="tab-content"></div>
        <div id="analysis" class="tab-content"></div>
      </div>
    </section>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
