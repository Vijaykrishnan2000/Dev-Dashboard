<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Intelligence Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <!-- ══════════ HEADER ══════════ -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2L26 9V19L14 26L2 19V9L14 2Z" stroke="url(#logoGrad)" stroke-width="1.5" fill="none"/>
          <path d="M14 8L20 11.5V18.5L14 22L8 18.5V11.5L14 8Z" fill="url(#logoGrad)" opacity="0.7"/>
          <defs>
            <linearGradient id="logoGrad" x1="2" y1="2" x2="26" y2="26">
              <stop offset="0%" stop-color="#38bdf8"/>
              <stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-primary">PR</span>
        <span class="logo-secondary">Intelligence</span>
      </div>
      <div class="header-divider"></div>
      <div class="header-badge" id="storyCountBadge">Loading…</div>
    </div>

    <div class="header-right">
      <div class="status-indicator" id="globalStatus">
        <span class="status-dot"></span>
        <span class="status-text">Initializing</span>
      </div>
      <div class="user-profile">
        <div class="user-avatar">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="18" fill="url(#avatarGrad)"/>
            <path d="M18 18c3.31 0 6-2.69 6-6s-2.69-6-6-6-6 2.69-6 6 2.69 6 6 6zm0 3c-4 0-12 2-12 6v3h24v-3c0-4-8-6-12-6z" fill="white" opacity="0.9"/>
            <defs>
              <linearGradient id="avatarGrad" x1="0" y1="0" x2="36" y2="36">
                <stop offset="0%" stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#6366f1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="user-info">
          <span class="user-name">Vijay Krishnan</span>
          <div class="user-dropdown">
            <div class="dropdown-email">soundarakrishna@gmail.com</div>
            <div class="dropdown-role">Engineering Lead</div>
            <div class="dropdown-status">
              <span class="dot-green"></span> Active Session
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ══════════ BODY ══════════ -->
  <div class="main">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Stories</span>
        <span class="sidebar-count" id="sidebarCount">0</span>
      </div>
      <div class="sidebar-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="storySearch" placeholder="Filter stories…" />
      </div>
      <div id="storyList" class="story-list"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <section class="content" id="mainContent">

      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect x="8" y="8" width="48" height="48" rx="8" stroke="url(#emptyGrad)" stroke-width="1.5" stroke-dasharray="4 4"/>
            <path d="M32 24v16M24 32h16" stroke="url(#emptyGrad)" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="emptyGrad" x1="8" y1="8" x2="56" y2="56">
                <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
                <stop offset="100%" stop-color="#818cf8" stop-opacity="0.5"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h3>Select a Story</h3>
        <p>Choose a Jira story from the sidebar to view commits, analysis, and test intelligence</p>
      </div>

      <!-- DETAILS PANEL -->
      <div id="details" class="details hidden">

        <!-- Story Meta -->
        <div class="story-meta">
          <div class="story-meta-left">
            <div class="story-id-tag" id="storyIdTag"></div>
            <h1 id="storyTitle" class="story-title"></h1>
          </div>
          <div class="story-meta-right">
            <span class="story-status-badge" id="storyStatus"></span>
            <button class="export-btn" id="exportBtn" title="Export Report">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export
            </button>
          </div>
        </div>

        <!-- TABS -->
        <nav class="tabs" role="tablist">
          <button class="tab active" data-tab="overview" role="tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Overview
          </button>
          <button class="tab" data-tab="commits" role="tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            Commits
            <span class="tab-badge" id="commitsBadge">0</span>
          </button>
          <button class="tab" data-tab="analysis" role="tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Analysis
          </button>
          <button class="tab" data-tab="testing" role="tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Testing Suite
            <span class="tab-badge tab-badge-new">AI</span>
          </button>
        </nav>

        <!-- TAB CONTENTS -->
        <div id="overview"  class="tab-content active"></div>
        <div id="commits"   class="tab-content"></div>
        <div id="analysis"  class="tab-content"></div>
        <div id="testing"   class="tab-content"></div>

      </div>
    </section>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
